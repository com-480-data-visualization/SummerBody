<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Representation of athletes nationalities</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <canvas id="ath_nat" width="400" height="200"></canvas>

    <script>
        fetch("data.json")
            .then(response => response.json())
            .then(data => {
                const k = Object.keys(data);
                const v = Object.values(data);

                const ctx = document.getElementById('ath_nat').getContext('2d');
                const myChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: k,
                        datasets: [{
                            label: 'Number of athletes',
                            data: v,
                            backgroundColor: 'rgba(75, 192, 192, 0.2)',
                            borderColor: 'rgba(75, 192, 192, 1)',
                            borderWidth: 1
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            title: {
                                display: true,
                                text: 'Representation of athletes nationalities',
                                font: {
                                    size: 20
                                }
                            }
                        },
                        scales: {
                            x: {
                                ticks: {
                                    autoSkip: false,
                                    maxRotation: 90,
                                    minRotation: 45
                                }
                            },
                            y: {
                                beginAtZero: true,
                                ticks: {
                                    stepSize: 500
                                }
                            }
                        }
                    }
                });
            })
            .catch(error => console.error('Error loading data:', error));
    </script>

</body>
</html>
